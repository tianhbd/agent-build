kind: ReferenceInterfaceContract
version: 0.12.0
description: n8n 与节点 agent 的参考 JSON 契约（非强制 HTTP）。
contracts:
  - name: invoke_node_agent
    required_fields: [task_id, node_id, node_type, payload, trace_id]
  - name: node_agent_result
    required_fields: [task_id, node_id, status, flow_gate_payload, stage_reports, result_payload]
notes:
  - n8n 仅做流程级校验与编排。
  - 节点 agent 负责内容质量控制。
  - subagent 不暴露给 n8n。
